# A3 — EN training + R5 lang-consistency reward
# Same as A1 (Open-RS RS2) but adds R5 reward to penalize code-switching.
# R5 fires when completion language ≠ prompt language. With EN prompts,
# R5 penalizes code-switched output (e.g., Chinese chars in EN response).
# Tests reward axis: does R5 help model maintain language consistency?

extends: base.yaml

model_short: deepseek_r1_distill_15b
model_name_or_path: deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B
condition: enlang

# Same as A1 — open-rs EN data
train_dataset_hf: knoveleng/open-rs
train_split: train

rewards:
  - name: correctness
    weight: 1.0
  - name: format
    weight: 1.0
  - name: lang
    weight: 1.0
    config:
      no_penalty_for_en: false   # ENABLE R5 cho EN prompts → penalize code-switching
      min_response_tokens: 10
      fasttext_model: data/raw/lid.176.bin

grpo:
  learning_rate: 1.0e-6
  num_generations: 6
  max_prompt_length: 512
  max_completion_length: 3584
  temperature: 0.7
  beta: 0.04
  per_device_train_batch_size: 6
  gradient_accumulation_steps: 16
  max_steps: 100
  save_steps: 50
  logging_steps: 5
  warmup_ratio: 0.1
  lr_scheduler_type: cosine_with_min_lr
  lr_scheduler_kwargs:
    min_lr_rate: 0.1
  bf16: true
  attn_implementation: flash_attention_2
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false
  use_vllm: true
  vllm_gpu_memory_utilization: 0.25
  vllm_max_model_len: 4608
  num_train_epochs: 1

lora:
  enabled: true
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj]
  task_type: CAUSAL_LM
  bias: none

gating:
  benchmark: amc23
  ckpt_step: 50
