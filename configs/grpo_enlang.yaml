# GRPO config — Cond C (English training + lang-consistency reward R5)

extends: base.yaml

condition: enlang
train_dataset: data/processed/en_train_7k.jsonl

rewards:
  - name: correctness
    weight: 1.0
  - name: format
    weight: 1.0
  - name: length
    weight: 1.0
  - name: tag
    weight: 1.0
  - name: lang                # R5: fastText langID match prompt
    weight: 1.0
    config:
      no_penalty_for_en: true   # EN prompts → reward 0 (no penalty)
      min_response_tokens: 10   # short response → return 0 (fastText unreliable)
      fasttext_model: data/raw/lid.176.bin

grpo:
  learning_rate: 1.0e-6
  num_generations: 6
  max_prompt_length: 512
  max_completion_length: 3584
  temperature: 0.7
  beta: 0.04
  per_device_train_batch_size: 6
  gradient_accumulation_steps: 16
  max_steps: 500
  save_steps: 50
  logging_steps: 5
  warmup_ratio: 0.1
  lr_scheduler_type: cosine_with_min_lr
  lr_scheduler_kwargs:
    min_lr_rate: 0.1
  bf16: true
  attn_implementation: flash_attention_2
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false
  use_vllm: true
  vllm_gpu_memory_utilization: 0.7
  vllm_max_model_len: 4608
  num_train_epochs: 1

lora:
  enabled: false
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj]
