# Reproduce Open-RS RS2 — W2 gating decision point
# Source: phase0_03_open_rs_reproduction.md + phase8_pivot_decision.md
# Target: AMC23 pass@1 ∈ [77, 83] (80.0 ± 3pp) sau 50 GRPO steps
# Run: bash scripts/reproduce_open_rs.sh

extends: base.yaml

model_short: deepseek_r1_distill_15b
model_name_or_path: deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B

train_dataset_hf: knoveleng/open-rs   # KHÔNG decontaminate cho gating run
train_split: train

# Phase 8 update: R2 format dùng Open-RS native pattern (`<think>.+?</think>` only).
rewards:
  - name: correctness        # = "accuracy" trong Open-RS
    weight: 1.0
  - name: format             # Open-RS native — chỉ require <think>...</think>
    weight: 1.0

grpo:
  learning_rate: 1.0e-6
  num_generations: 6
  max_prompt_length: 512
  max_completion_length: 3584     # Exp2 setting (Exp1 dùng 4096)
  temperature: 0.7
  beta: 0.04
  per_device_train_batch_size: 6
  gradient_accumulation_steps: 16  # eff batch 96 (Open-RS 4×A40 × 6 × 4 = 96)
  max_steps: 100                   # eval ở 50 và 100
  save_steps: 50                   # peak @ step 50 cho RS2
  logging_steps: 5
  warmup_ratio: 0.1
  lr_scheduler_type: cosine_with_min_lr
  lr_scheduler_kwargs:
    min_lr_rate: 0.1
  bf16: true
  attn_implementation: flash_attention_2
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false
  use_vllm: true
  vllm_gpu_memory_utilization: 0.25  # 1×A100 80GB: 20GB vllm, 60GB training
  vllm_max_model_len: 4608
  num_train_epochs: 1

# Single A100 80GB constraint: full-param OOMs (Open-RS dùng 4×A40=192GB).
# LoRA r=16 là compromise — note trong paper limitations.
lora:
  enabled: true
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj]
  task_type: CAUSAL_LM
  bias: none

# Decision band cho gating
gating:
  benchmark: amc23
  ckpt_step: 50
  target: 80.0
  tolerance: 3.0
  pass_band: [77.0, 83.0]
  partial_band: [70.0, 77.0]   # try ckpt-100 / debug
  fail_below: 70.0              # pivot Idea 4
